<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>认人挑战</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 40px;
            background: #f5f5f5
        }

        img {
            max-width: 300px;
            border-radius: 8px;
            margin: 20px 0;
            box-shadow: 0 0 10px #aaa
        }

        input {
            padding: 10px;
            width: 220px;
            font-size: 16px
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer
        }

        .result {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0
        }

        .correct {
            color: green
        }

        .wrong {
            color: red
        }

        .score {
            font-size: 20px;
            color: #0066cc;
            margin-top: 30px
        }
    </style>
</head>

<body>
    <h1>认人挑战</h1>
    <div id="game"></div>
    <div class="score" id="score"></div>

    <script>
        // ==============================================
        // 在这里替换成你的图片链接和答案
        // ==============================================
        const questions = [
            {
                img: "images/崔智秀.jpg",
                ans: "崔智秀"
            },
            {
                img: "images/范玉欣.jpg",
                ans: "范玉欣"
            },
            {
                img: "images/元天空.jpg",
                ans: "元天空"
            }
                        {
                img: "images/momo.jpg",
                ans: "平井桃"
            },
            {
                img: "images/金志垣.jpg",
                ans: "金志垣"
            },
            {
                img: "images/李修旻.jpg",
                ans: "李修旻"
            }
                    {
                img: "images/帕丽塔.jpg",
                ans: "帕丽塔"
            },
            {
                img: "images/吴海媛.jpg",
                ans: "吴海媛"
            },
            {
                img: "images/周子瑜.jpg",
                ans: "周子瑜"
            }
                    
        ];

        let current = 0;
        let correct = 0;

        function render() {
            if (current >= questions.length) {
                const rate = ((correct / questions.length) * 100).toFixed(1);
                document.getElementById("game").innerHTML = `
       <h2>挑战结束！</h2>
       <p>答对：${correct} 题，共 ${questions.length} 题</p>
       <p>正确率：${rate}%</p>
       <button onclick="location.reload()">再来一次</button>
     `;
                document.getElementById("score").innerText = "";
                return;
            }

            const q = questions[current];
            document.getElementById("game").innerHTML = `
     <img src="${q.img}" alt="人物">
     <br>
     <input type="text" id="input" placeholder="输入名字" autocomplete="off">
     <button onclick="check()">提交答案</button>
     <div id="tip"></div>
   `;
            document.getElementById("score").innerText =
                `进度：${current + 1}/${questions.length}`;
        }

        function check() {
            const user = document.getElementById("input").value.trim();
            const ans = questions[current].ans.trim();
            const tip = document.getElementById("tip");

            if (user === ans) {
                tip.className = "result correct";
                tip.innerText = "✅ 回答正确！";
                correct++;
            } else {
                tip.className = "result wrong";
                tip.innerText = "❌ 回答错误，正确答案：" + ans;
            }

            setTimeout(() => {
                current++;
                render();
            }, 1200);
        }

        // 开始游戏
        render();
    </script>
</body>

</html>
